# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - iliasse2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          
      - name: Install Bun
        shell: bash
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "PATH=$HOME/.bun/bin:\$PATH" >> $GITHUB_ENV

    # NEW STEP: Ensure required dependencies are installed
      - name: Install required system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential sh

          
      - name: Set env vars and run build steps
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KEY_VAULTS_SECRET: ${{ secrets.KEY_VAULTS_SECRET }}
        run: |
              echo "Running build and migrations..."
              npm install --legacy-peer-deps
              NODE_OPTIONS="--max-old-space-size=8192" npm run build --if-present
              npm run test --if-present
              bun run db:migrate
          

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'iliasse2'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BA40B43FC3B8475791FBBF06ACC1E7A7 }}
